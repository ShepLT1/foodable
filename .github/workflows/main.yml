name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  changes:
    name: Detect changed files
    runs-on: ubuntu-latest

    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      supabase: ${{ steps.filter.outputs.supabase }}
      workflow: ${{ steps.filter.outputs.workflow }}

    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

            frontend:
              - 'frontend/**'

            supabase:
              - 'supabase/**'

            workflow:
              - '.github/workflows/**'

  backend:
    name: Backend (FastAPI)
    needs: changes

    if: |
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.workflow == 'true'

    runs-on: ubuntu-latest

    env:
      SUPABASE_URL: https://example.supabase.co
      DATABASE_URL: postgresql+asyncpg://test:test@localhost/test
      FRONTEND_URL: http://localhost:5173

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Type check with MyPy
        run: mypy .

      - name: Run tests
        run: pytest --cov=app

  frontend:
    name: Frontend (React)
    needs: changes

    if: |
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.workflow == 'true'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npm run type-check

      - name: Build frontend
        run: npm run build

  supabase:
    name: Supabase
    needs: changes

    if: |
      needs.changes.outputs.supabase == 'true' ||
      needs.changes.outputs.workflow == 'true'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Placeholder
        run: echo "No Supabase validation configured yet."

  ci:
    name: CI

    if: always()

    needs:
      - changes
      - backend
      - frontend
      - supabase

    runs-on: ubuntu-latest

    steps:
      - name: Verify required jobs
        run: |
          echo "Backend:  ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Supabase: ${{ needs.supabase.result }}"

          if [[ \
            "${{ needs.backend.result }}" == "failure" || \
            "${{ needs.frontend.result }}" == "failure" || \
            "${{ needs.supabase.result }}" == "failure" || \
            "${{ needs.backend.result }}" == "cancelled" || \
            "${{ needs.frontend.result }}" == "cancelled" || \
            "${{ needs.supabase.result }}" == "cancelled" \
          ]]; then
            exit 1
          fi

          echo "All required checks passed."